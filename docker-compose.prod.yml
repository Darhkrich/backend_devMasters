services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  migrate:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      - db
      - redis
    command: ["python", "manage.py", "migrate", "--noinput"]

  web:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      - migrate
    ports:
      - "8000:8000"
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]

  worker:
    build: .
    env_file:
      - .env
    environment:
      APP_ENV: production
    depends_on:
      - migrate
    command: ["python", "manage.py", "run_task_worker", "--worker-name", "worker-1"]

volumes:
  postgres_data:
  redis_data:
