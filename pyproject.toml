[tool.black]
line-length = 88
target-version = ["py313"]
exclude = "migrations"

[tool.ruff]
line-length = 88
target-version = "py313"
extend-exclude = ["venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
exclude = ["venv", ".*migrations.*", "tests"]
